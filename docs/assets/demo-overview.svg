<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Knowledge-Based Minesweeper AI demo overview</title>
  <desc id="desc">A lightweight visual overview of the browser demo layout with a Minesweeper board, controls, and reasoning notes.</desc>
  <rect width="1200" height="720" fill="#f6f7fb"/>
  <rect x="64" y="52" width="1072" height="616" rx="24" fill="#ffffff" stroke="#d8dee9" stroke-width="2"/>

  <text x="104" y="112" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#111827">Knowledge-Based Minesweeper AI</text>
  <text x="104" y="150" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#4b5563">Symbolic inference, reasoning traces, and browser gameplay</text>

